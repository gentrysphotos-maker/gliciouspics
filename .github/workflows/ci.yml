name: CI

# Fast, deterministic checks. Runs on every push and PR (including PRs from
# forks). No external services, no secrets — never blocks a contributor.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests + catalog validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate catalog (products.json ↔ galleries ↔ sitemap)
        run: npm run validate

      - name: Run unit tests
        run: npm test
